spring:
  datasource:
    # 1. DB 주소: localhost(내 컴퓨터)의 3306번 문(포트)으로 들어가서 paywise라는 방(DB)을 찾아라!
    url: jdbc:mysql://localhost:3306/paywise?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true

    # 2. 접속기(Driver): MySQL과 대화할 때 쓰는 통역사 이름
    driver-class-name: com.mysql.cj.jdbc.Driver

    # 3. 계정 정보: MySQL 로그인 아이디와 비밀번호
    username: root
    password: "0000" # 여기에 실제 MySQL 비밀번호를 적어라

  jpa:
    hibernate:
      # 4. 자동 생성: 우리가 만든 자바 엔티티(@Entity)를 보고 DB 테이블을 자동으로 만들어라
      ddl-auto: update

    # 5. 확인용: 실제로 어떤 SQL문이 실행되는지 콘솔창에 보여줌
    show-sql: true
    properties:
      hibernate:
        format_sql: true # SQL을 예쁘게 정렬해서 보여주는 기능